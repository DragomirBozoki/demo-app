name: CI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run tests
        id: tests
        run: |
          set +e
          TEST_OUTPUT=$(node tests/test.js 2>&1)
          TEST_EXIT=$?
          set -e

          echo "$TEST_OUTPUT"
          echo "$TEST_OUTPUT" > /tmp/test-output.txt
          echo "exit_code=$TEST_EXIT" >> $GITHUB_OUTPUT

          exit $TEST_EXIT

      - name: Send failure to SuperPlane
        if: failure()
        env:
          SUPERPLANE_WEBHOOK_URL: ${{ secrets.SUPERPLANE_WEBHOOK_URL }}
          SUPERPLANE_WEBHOOK_SECRET: ${{ secrets.SUPERPLANE_WEBHOOK_SECRET }}
        run: |
          TEST_LOG=$(cat /tmp/test-output.txt 2>/dev/null || echo "No test output captured")

          # Build JSON payload
          PAYLOAD=$(jq -n \
            --arg repo "${{ github.repository }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg commit "${{ github.sha }}" \
            --arg commit_msg "${{ github.event.head_commit.message }}" \
            --arg author "${{ github.actor }}" \
            --arg run_id "${{ github.run_id }}" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg test_log "$TEST_LOG" \
            '{
              type: "ci_failure",
              repository: $repo,
              branch: $branch,
              commit: $commit,
              commit_message: $commit_msg,
              author: $author,
              run_id: $run_id,
              run_url: $run_url,
              test_output: $test_log,
              timestamp: (now | todate)
            }')

          # Generate HMAC SHA-256 signature
          SIGNATURE=$(echo -n "$PAYLOAD" \
            | openssl dgst -sha256 -hmac "$SUPERPLANE_WEBHOOK_SECRET" -binary \
            | xxd -p -c 256)

          # Send to SuperPlane with signature header
          HTTP_STATUS=$(curl -s -o /tmp/webhook-response.txt -w "%{http_code}" \
            -X POST "$SUPERPLANE_WEBHOOK_URL" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -H "Content-Type: application/json" \
            --data-binary "$PAYLOAD")

          echo "📤 Webhook response: HTTP $HTTP_STATUS"
          cat /tmp/webhook-response.txt
          echo ""

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ Failure report sent to SuperPlane"
          else
            echo "❌ Failed to send to SuperPlane (HTTP $HTTP_STATUS)"
          fi